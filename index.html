<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumay Blog | Insights for Modern Content Creators</title>
    <meta name="description" content="Expert insights on SEO, content strategy, and digital marketing. Learn proven techniques to grow your online presence with Lumay Blog." />
    <meta name="author" content="Lumay Blog" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lumay.blog" />

    <!-- Open Graph -->
    <meta property="og:title" content="Lumay Blog | Insights for Modern Content Creators" />
    <meta property="og:description" content="Expert insights on SEO, content strategy, and digital marketing." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lumay Blog" />
    <meta property="og:image" content="https://lumay.blog/og-image.jpg" />
    <meta property="og:url" content="https://lumay.blog" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@LumayBlog" />
    <meta name="twitter:title" content="Lumay Blog | Content Creation Insights" />
    <meta name="twitter:description" content="Expert insights on SEO, content strategy, and digital marketing." />
    <meta name="twitter:image" content="https://lumay.blog/twitter-image.jpg" />

    <!-- Schema.org Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Lumay Blog",
      "url": "https://lumay.blog",
      "logo": "https://lumay.blog/logo.png",
      "description": "Expert insights on SEO, content strategy, and digital marketing."
    }
    </script>

    <!-- Schema.org WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Lumay Blog",
      "url": "https://lumay.blog",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://lumay.blog/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
